<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent Labs — автономные ИИ-агенты для бизнеса</title>
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#000000" />
    <script>
      (function () {
        try {
          var p = localStorage.getItem("agentlab-theme");
          var sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          /* Два режима: light | dark; «system» в старой версии один раз переводится в явный выбор. */
          var resolved =
            p === "dark"
              ? "dark"
              : p === "light"
                ? "light"
                : p === "system"
                  ? (sysDark ? "dark" : "light")
                  : "dark";
          if (p === "system") {
            localStorage.setItem("agentlab-theme", resolved);
          }
          var root = document.documentElement;
          root.dataset.theme = resolved;
          root.style.colorScheme = resolved;
          root.classList.toggle("dark", resolved === "dark");
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", resolved === "dark" ? "#000000" : "#ffffff");
          var locKey = "agentlab-locale";
          var locale = localStorage.getItem(locKey);
          var htmlLang = "ru";
          if (locale === "en" || locale === "ru") {
            htmlLang = locale;
          } else if ((navigator.language || "").toLowerCase().startsWith("en")) {
            htmlLang = "en";
          }
          document.documentElement.lang = htmlLang;
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
